<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
</head>
<body>
    <h1>Javascript Operators</h1>
    <p id="example"></p>
    <script>
        //This is a comment
        var x = 200;
        var y= 100;
        var z = x - y;
        document.getElementById("example").innerHTML = "This is the value of z: " + z;
    </script>
</body>
</html>
