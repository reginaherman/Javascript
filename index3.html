<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statements</title>
</head>
<body>
    <h2>JAVASCRIPT STATEMENTS</h2>
    <p><b><u>Javascript statements are instructions by the browser to be executed</u></b></p>
    <p id="demo">
        <script>
            var x, y, z; // Statement 1
             x = 5; // Statement 2
             y = 8; //Statement 3
             z = x + y; //statement 4
             document.getElementById("demo").innerHTML = "The value of z = " + z + ".";

        </script>
    </p>
</body>
</html>
