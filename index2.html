<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
</head>
<body>
    <h1>Javascript Variables</h1>
    <p>SUM IN VARIABLES</p>
    <p id="result"></p>
    <script>
         var num1 = 20;
         var num2 = 30;
         var sum = num1 + num2;
         document.getElementById("result").innerHTML = "The sum of is " + sum;
    </script>
</body>
</html>
